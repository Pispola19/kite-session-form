<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kite Session Form</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    select, input, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>
<div class="container">

<h2>Kite Session</h2>

<input id="weight" placeholder="Peso kg" />
<input id="wind" placeholder="Vento nodi" />
<input id="kite" placeholder="Kite m²" />

<select id="board">
  <option value="">Board size</option>

  <!-- NUOVE MISURE AGGIUNTE -->
  <option>125x38</option>
  <option>129x38</option>
  <option>130x39</option>
  <option>132x39</option>
  <option>133x39</option>
  <option>133x40</option>
  <option>134x40</option>
  <option>135x40</option>
  <option>136x40.5</option>
  <option>137x40.5</option>
  <option>137x41</option>
  <option>138x41</option>
  <option>138x42</option>
  <option>139x41</option>
  <option>140x41</option>
  <option>140x42</option>
  <option>141x41</option>
  <option>141x42</option>
  <option>142x42</option>
  <option>144x41.5</option>
  <option>144x44</option>
  <option>145x43</option>
  <option>146x43</option>
  <option>147x44</option>
  <option>148x45</option>
  <option>160x45</option>
  <option>160x46</option>

</select>

<button onclick="send()">Invia</button>

</div>

<script>

const WHATSAPP_NUMBER = "393XXXXXXXXX"; // METTI IL TUO

function generateId() {
  return Math.random().toString(36).substring(2,12);
}

function send() {

  const weight = document.getElementById("weight").value;
  const wind = document.getElementById("wind").value;
  const kite = document.getElementById("kite").value;
  const board = document.getElementById("board").value;

  const id = generateId();
  const ts = new Date().toISOString();

  let message = "";

  if (weight) message += `⚖️ Peso (kg): ${weight}\n`;
  if (kite) message += `🪁 Kite (m²): ${kite}\n`;
  if (wind) message += `🌬️ Vento (kts): ${wind}\n`;
  if (board) message += `🪵 Misura tavola: ${board}\n`;

  message += "\n---\n";
  message += `ID: ${id}\n`;
  message += `TS: ${ts}\n`;
  message += "SRC: rdk_v1\n";
  message += "---";

  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}

</script>

</body>
</html>
